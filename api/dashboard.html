<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balina-Bot 🏴‍☠️ Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .glow-green {
            text-shadow: 0 0 10px #22c55e;
            color: #4ade80;
        }

        .glow-red {
            text-shadow: 0 0 10px #ef4444;
            color: #f87171;
        }

        .glow-blue {
            text-shadow: 0 0 10px #3b82f6;
            color: #60a5fa;
        }
    </style>
</head>

<body class="p-6 h-screen flex flex-col gap-6">

    <!-- Header Panel -->
    <div class="glass-panel p-6 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">Balina-Bot <span class="text-blue-400">Terminal</span>
            </h1>
            <p class="text-sm text-gray-400 mt-1" id="status-text">Status: <span class="glow-blue">CONNECTING...</span>
            </p>
        </div>
        <div class="flex gap-8 text-right">
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold">Wallet Balance (USDT)</p>
                <p class="text-2xl font-mono" id="val-wallet">0.00</p>
            </div>
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold">Unrealized PnL</p>
                <p class="text-2xl font-mono" id="val-pnl">0.00</p>
            </div>
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold">Open Orders</p>
                <p class="text-2xl font-mono glow-blue" id="val-orders">0</p>
            </div>
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold">Latency (ms)</p>
                <p class="text-2xl font-mono text-yellow-400" id="val-latency">0</p>
            </div>
        </div>
    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 flex-grow">
        <!-- Z-Score Chart -->
        <div class="glass-panel p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></span>
                    Mean Reversion (Z-Score)
                </h2>
                <span class="text-xl font-mono font-bold" id="val-zscore">0.000</span>
            </div>
            <div class="flex-grow w-full relative">
                <canvas id="zscoreChart"></canvas>
            </div>
        </div>

        <!-- Volume/Momentum Chart -->
        <div class="glass-panel p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-500 animate-pulse"></span>
                    Momentum (VPIN & OBI)
                </h2>
                <div class="text-right">
                    <span class="text-sm text-gray-400">VPIN: </span><span class="font-mono font-bold text-red-400 mr-2"
                        id="val-vpin">0.00</span>
                    <span class="text-sm text-gray-400">OBI: </span><span class="font-mono font-bold text-green-400"
                        id="val-obi">0.00</span>
                </div>
            </div>
            <div class="flex-grow w-full relative">
                <canvas id="momentumChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Chart Configs
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';

        const zscoreCtx = document.getElementById('zscoreChart').getContext('2d');
        const momentumCtx = document.getElementById('momentumChart').getContext('2d');

        const zscoreChart = new Chart(zscoreCtx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [{
                    label: 'Z-Score',
                    data: Array(50).fill(0),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    y: {
                        min: -5,
                        max: 5,
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        const momentumChart = new Chart(momentumCtx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [
                    {
                        label: 'VPIN (Toxicity)',
                        data: Array(50).fill(0),
                        borderColor: '#ef4444',
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0
                    },
                    {
                        label: 'OBI (Momentum)',
                        data: Array(50).fill(0),
                        borderColor: '#22c55e',
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    y: {
                        min: 0,
                        max: 1.0,
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { position: 'top' } }
            }
        });

        // Polling Data
        // Replace with physical sever IP automatically when deployed
        const API_URL = "/telemetry";

        async function fetchTelemetry() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // Update Header Stats
                document.getElementById('status-text').innerHTML = `Status: <span class="glow-green uppercase">${data.status}</span> | Uptime: ${Math.floor(data.uptime)}s`;
                document.getElementById('val-wallet').textContent = `$${data.wallet_balance.toFixed(2)}`;

                const pnlEl = document.getElementById('val-pnl');
                pnlEl.textContent = `$${data.unrealized_pnl.toFixed(2)}`;
                pnlEl.className = data.unrealized_pnl >= 0 ? "text-2xl font-mono glow-green" : "text-2xl font-mono glow-red";

                document.getElementById('val-orders').textContent = data.open_orders;
                document.getElementById('val-latency').textContent = data.latency_ms.toFixed(1);

                // Update Values
                document.getElementById('val-zscore').textContent = data.zscore.toFixed(3);
                document.getElementById('val-vpin').textContent = data.vpin.toFixed(3);
                document.getElementById('val-obi').textContent = data.obi.toFixed(3);

                // Update Charts
                const zData = zscoreChart.data.datasets[0].data;
                zData.push(data.zscore);
                zData.shift();
                zscoreChart.update();

                const vpinData = momentumChart.data.datasets[0].data;
                const obiData = momentumChart.data.datasets[1].data;
                vpinData.push(data.vpin);
                vpinData.shift();
                obiData.push(data.obi);
                obiData.shift();
                momentumChart.update();

            } catch (err) {
                document.getElementById('status-text').innerHTML = `Status: <span class="glow-red">DISCONNECTED</span>`;
            }
        }

        // Poll every 500ms
        setInterval(fetchTelemetry, 500);
    </script>
</body>

</html>
